  - name: test
    image: node:20-alpine
    commands:
      - npm install -g pnpm
      - pnpm test
    depends_on:
      - install

  - name: build
    image: node:20-alpine
    commands:
      - npm install -g pnpm
      - pnpm build
    depends_on:
      - typecheck
      - test

  - name: smoke-test
    image: docker:27-cli
    commands:
      - apk add --no-cache bash curl postgresql-client redis
      - docker compose -f docker-compose.yml up -d
      - bash ./scripts/wait-for-healthy.sh 180
      - bash ./scripts/smoke-test.sh
    environment:
      PG_USER: nebula
