---
kind: pipeline
type: docker
name: nebula-dominion

trigger:
  branch:
    - main
    - develop
    - feature/*
    - hotfix/*
    - release/*

steps:
  - name: install
    image: node:20-alpine
    commands:
      - corepack enable
      - pnpm install --frozen-lockfile
    volumes:
      - name: pnpm-cache
        path: /root/.local/share/pnpm/store

  - name: typecheck
    image: node:20-alpine
    commands:
      - corepack enable
      - pnpm typecheck
    depends_on:
      - install

  - name: test
    image: node:20-alpine
    commands:
      - corepack enable
      - pnpm test --passWithNoTests
    environment:
      NODE_ENV: test
    depends_on:
      - install

  - name: build
    image: node:20-alpine
    commands:
      - corepack enable
      - pnpm build
    environment:
      NODE_ENV: production
    depends_on:
      - typecheck
      - test

  - name: docker-build
    image: plugins/docker
    settings:
      registry: registry.local:5000
      repo: registry.local:5000/nebula-dominion
      tags:
        - latest
        - ${DRONE_COMMIT_SHA:0:7}
        - ${DRONE_BRANCH//\//-}
      dockerfile: Dockerfile
      insecure: true
    depends_on:
      - build
    when:
      branch:
        - main
        - develop

  - name: deploy-staging
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: staging_host
      username: deploy
      key:
        from_secret: ssh_key
      port: 22
      script:
        - docker service update --image registry.local:5000/nebula-dominion:${DRONE_COMMIT_SHA:0:7} nebula_web
        - docker service update --image registry.local:5000/nebula-dominion:${DRONE_COMMIT_SHA:0:7} nebula_api
        - docker system prune -f --filter "until=24h"
    depends_on:
      - docker-build
    when:
      branch:
        - develop

  - name: deploy-production
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: prod_host
      username: deploy
      key:
        from_secret: ssh_key
      port: 22
      script:
        - docker service update --image registry.local:5000/nebula-dominion:${DRONE_COMMIT_SHA:0:7} --update-parallelism 2 --update-delay 10s nebula_web
        - docker service update --image registry.local:5000/nebula-dominion:${DRONE_COMMIT_SHA:0:7} --update-parallelism 2 --update-delay 10s nebula_api
        - docker system prune -f --filter "until=24h"
    depends_on:
      - docker-build
    when:
      branch:
        - main

  - name: notify-success
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: deployments
      template: >
        *Build Success* :white_check_mark:
        Repo: {{ repo.name }}
        Branch: {{ build.branch }}
        Commit: {{ build.commit }}
        Author: {{ build.author }}
        Link: {{ build.link }}
    when:
      status:
        - success
    depends_on:
      - deploy-staging
      - deploy-production

  - name: notify-failure
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_webhook
      channel: deployments
      template: >
        *Build Failed* :x:
        Repo: {{ repo.name }}
        Branch: {{ build.branch }}
        Commit: {{ build.commit }}
        Author: {{ build.author }}
        Link: {{ build.link }}
    when:
      status:
        - failure

volumes:
  - name: pnpm-cache
    host:
      path: /var/cache/pnpm
