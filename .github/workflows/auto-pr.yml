name: Auto Create PR for Agent Branches

on:
  push:
    branches:
      - 'agent/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR if not exists
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // Check if PR already exists for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (prs.length > 0) {
              console.log(`PR already exists for ${branch}: #${prs[0].number}`);
              return;
            }

            console.log(`Creating PR for branch: ${branch}`);

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Merge ${branch}`,
              head: branch,
              base: 'main',
              body: 'Auto-created by GitHub Actions',
            });

            console.log(`PR #${pr.number} created: ${pr.html_url}`);
