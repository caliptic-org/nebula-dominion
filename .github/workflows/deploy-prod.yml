name: Deploy to Production (Docker Compose on LXC 204)

# Mimari: kod main'e push → self-hosted runner LXC 204'te tetiklenir →
# runner workspace'inde docker compose build → /opt/nebula-dominion/.env
# kullanarak `up -d` → healthcheck + internal/public smoke test.
#
# Runner: actions.runner.caliptic-org-nebula-dominion.nebula-prod-runner.service
#         user: nebula-runner (docker grup üyesi)
#         host: LXC 204 (10.10.10.40 / 192.168.1.231 mgmt)
#
# Re-install için: infrastructure/runner/install.sh

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'scripts/**'                    # dev/ops scripts (autoplay, smoke) — not COPY'd into any image
      - 'infrastructure/terraform/**'   # TF dosyaları stack'i etkilemiyor
      - 'infrastructure/runner/**'      # runner config'ini değiştiren PR build tetiklemesin
      - '.github/workflows/nginx-bastion.yml'
      - 'deploy/nginx/**'               # ayrı workflow (nginx-bastion) handle ediyor
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Sadece compose up -d (image build atla) — env veya config değişikliği için'
        required: false
        type: boolean
        default: false
      services:
        description: 'Rebuild edilecek servisler (virgülle ayrı). Default: api,game-server,web'
        required: false
        type: string
        default: 'api,game-server,web'

# Aynı anda sadece bir deploy koşsun; kuyruktakileri sıraya al, iptal etme.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

env:
  COMPOSE_PROJECT_NAME: nebula-dominion
  ENV_FILE: /opt/nebula-dominion/.env
  COMPOSE_FILES: -f docker-compose.yml -f docker-compose.prod.yml
  DOCKER_BUILDKIT: '1'
  COMPOSE_DOCKER_CLI_BUILD: '1'

jobs:
  deploy:
    name: Build + deploy to LXC 204
    runs-on: [self-hosted, nebula-prod]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show context
        run: |
          echo "Commit:    ${{ github.sha }}"
          echo "Ref:       ${{ github.ref }}"
          echo "Event:     ${{ github.event_name }}"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Runner:    $RUNNER_NAME"
          echo "Skip build:  ${{ inputs.skip_build }}"
          echo "Services:    ${{ inputs.services || 'api,game-server,web (default)' }}"
          docker --version
          docker compose version

      - name: Verify .env exists + readable
        run: |
          if ! test -r "$ENV_FILE"; then
            echo "::error::Cannot read $ENV_FILE — runner needs group=nebula-runner mode=640"
            exit 1
          fi
          # İçeriği dump ETME — sadece anahtar adlarını listele
          echo "Env keys present in $ENV_FILE:"
          awk -F= '/^[A-Z_][A-Z0-9_]*=/ {print "  "$1}' "$ENV_FILE" | sort -u
          # Critical vars must be present (otherwise api/game-server crash on boot)
          for required in DATABASE_URL JWT_SECRET CORS_ORIGINS NEXT_PUBLIC_API_URL NEXT_PUBLIC_GAME_SERVER_URL; do
            if ! grep -q "^${required}=" "$ENV_FILE"; then
              echo "::error::Missing required env var: $required"
              exit 1
            fi
          done

      - name: Validate compose config
        run: |
          # `config --quiet` parse eder, çıktı yok ama syntax fail varsa kırar.
          # Bütün env interpolation'larını da resolve eder — eksik var varsa burada görünür.
          docker compose $COMPOSE_FILES --env-file $ENV_FILE config --quiet

      - name: Pre-build disk guard (reclaim if low)
        # LXC 204 30 GB. Build cache + 3 image rebuild kolayca 10+ GB peak kullanır.
        # 2026-06 ENOSPC: post-build routine cleanup (24h window) bir önceki
        # deploy'un <24h image/cache'ini SİLEMEZ → disk birikip build'i ENOSPC'le
        # kırdı. Çözüm: build'DEN ÖNCE, free < LOW_GB ise AGGRESSIVE temizlik koş.
        # AGGRESSIVE sadece build cache + ÇALIŞMAYAN container'lara ait image'ları
        # siler — named volume / DB / çalışan container image'ları ASLA dokunulmaz
        # (eski deploy hâlâ ayakta; image'ı referanslı kalır). En kötü ihtimal:
        # bir sonraki build cache'siz başlar (yavaş ama doğru).
        #   LOW_GB    — altına düşünce aggressive temizlik tetiklenir (default 8)
        #   FLOOR_GB  — temizlikten SONRA hâlâ altındaysak build'i denemeden kır
        env:
          LOW_GB: '8'
          FLOOR_GB: '4'
        run: |
          avail_gb() { df -BG --output=avail / | tail -1 | tr -dc '0-9'; }
          echo "=== / mount (before) ==="; df -h /
          echo ""; echo "=== docker system df ==="; docker system df
          echo ""
          AVAIL_GB=$(avail_gb)
          if [ "${AVAIL_GB:-0}" -lt "$LOW_GB" ]; then
            echo "::warning::Only ${AVAIL_GB}G free (< ${LOW_GB}G) — running AGGRESSIVE pre-build cleanup."
            AGGRESSIVE=1 bash infrastructure/scripts/nebula-cleanup.sh || true
            AVAIL_GB=$(avail_gb)
            echo "=== / mount (after cleanup) ==="; df -h /
            echo "Reclaimed → ${AVAIL_GB}G free."
          else
            echo "OK: ${AVAIL_GB}G free (>= ${LOW_GB}G) — no pre-build cleanup needed."
          fi
          if [ "${AVAIL_GB:-0}" -lt "$FLOOR_GB" ]; then
            echo "::error::Still only ${AVAIL_GB}G free after cleanup (< ${FLOOR_GB}G floor)."
            echo "::error::Build would ENOSPC. Disk needs a human: prune named/dangling volumes or grow LXC 204."
            exit 1
          fi

      - name: Build images
        if: ${{ inputs.skip_build != true }}
        run: |
          SVCS="${{ inputs.services || 'api,game-server,web' }}"
          BUILD_TARGETS=$(echo "$SVCS" | tr ',' ' ')
          echo "Building: $BUILD_TARGETS"
          docker compose $COMPOSE_FILES --env-file $ENV_FILE \
            build --pull $BUILD_TARGETS

      - name: Apply stack (up -d)
        run: |
          docker compose $COMPOSE_FILES --env-file $ENV_FILE \
            up -d --remove-orphans

      - name: Wait for containers to become healthy/running
        run: |
          set -e
          # Sıra: önce stateful (redis, minio) sonra app servisleri.
          # game-server boot'unda migration koşar — biraz daha uzun olabilir.
          for svc in redis minio game-server api web; do
            cid=$(docker compose $COMPOSE_FILES --env-file $ENV_FILE ps -q $svc 2>/dev/null || true)
            if [ -z "$cid" ]; then
              echo "  $svc → no container (skipping)"
              continue
            fi
            echo "Waiting for $svc..."
            for i in $(seq 1 60); do
              status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{if .State.Running}}running{{else}}{{.State.Status}}{{end}}{{end}}' "$cid" 2>/dev/null || echo "unknown")
              case "$status" in
                healthy|running)
                  echo "  $svc → $status (after $((i*5))s)"
                  break
                  ;;
                starting|"")
                  : # keep waiting
                  ;;
                unhealthy|exited|dead)
                  echo "::error::$svc reached state $status"
                  docker compose $COMPOSE_FILES --env-file $ENV_FILE logs --tail=120 $svc || true
                  exit 1
                  ;;
              esac
              sleep 5
              if [ $i -eq 60 ]; then
                echo "::error::$svc never became healthy after 5min (last state: $status)"
                docker compose $COMPOSE_FILES --env-file $ENV_FILE logs --tail=120 $svc || true
                exit 1
              fi
            done
          done

      - name: Internal smoke test (LXC 10.10.10.40)
        run: |
          set -e
          ok() { echo "PASS   $1"; }
          fail() { echo "::error::$1"; exit 1; }
          # web /health (Next.js sayfası, 200 dönmeli)
          curl -fsS --max-time 15 http://10.10.10.40:3000/health > /dev/null \
            && ok "web :3000/health"      || fail "web :3000/health failed"
          # api OpenAPI JSON (Swagger)
          curl -fsS --max-time 15 http://10.10.10.40:4000/api/docs-json > /dev/null \
            && ok "api :4000/api/docs-json" || fail "api :4000/api/docs-json failed"
          # game-server health probe
          curl -fsS --max-time 15 http://10.10.10.40:3001/api/health/live > /dev/null \
            && ok "game-server :3001/api/health/live" || fail "game-server health failed"

      - name: Public smoke test (Cloudflare Tunnel → bastion → LXC)
        # Bu fail ederse internal smoke geçti demektir — sorun CF tunnel
        # veya bastion nginx tarafında. ::warning yapıyoruz, hard fail değil.
        run: |
          probe() {
            local label="$1" url="$2"
            if curl -fsS --max-time 20 "$url" > /dev/null; then
              echo "PASS   public $label"
            else
              echo "::warning::public $label failed — check CF tunnel + bastion nginx"
            fi
          }
          probe "web"         https://nebula.caliptic.com/health
          probe "api"         https://api-nebula.caliptic.com/api/docs-json
          probe "game-server" https://game-nebula.caliptic.com/api/health/live

      - name: Host disk cleanup
        # Always runs (even when smoke tests fail) so disk pressure can't
        # block the NEXT deploy.  Best-effort: failures inside the script
        # don't fail the workflow — `|| true` swallows the exit code.
        # Frees the biggest dynamic offenders: stale BuildKit cache (~1-2 GB
        # per web build), unreferenced images from prior deploys, runner
        # _temp scratch, and old .env.bak-* files.
        # Manual ad-hoc run on the LXC: bash infrastructure/scripts/nebula-cleanup.sh
        if: always()
        run: |
          bash infrastructure/scripts/nebula-cleanup.sh || true

      - name: Step summary
        if: always()
        run: |
          {
            echo "## Deploy result"
            echo ""
            echo "**Commit:** [\`$(echo ${{ github.sha }} | cut -c1-7)\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
            echo "**Trigger:** \`${{ github.event_name }}\`"
            echo "**Runner:** \`$RUNNER_NAME\`"
            echo ""
            echo "### Container status"
            echo '```'
            docker compose $COMPOSE_FILES --env-file $ENV_FILE ps 2>&1 || echo "(compose ps failed)"
            echo '```'
            echo ""
            echo "### Public URLs"
            echo "- https://nebula.caliptic.com"
            echo "- https://api-nebula.caliptic.com/api/docs"
            echo "- https://game-nebula.caliptic.com/api/health/live"
          } >> "$GITHUB_STEP_SUMMARY"
