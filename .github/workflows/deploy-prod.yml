name: Deploy to Production

# Tag-bazlı deploy:
#   main üstündeki bir commit'e semver tag (v*) push edildiğinde
#   tetiklenir. Örnek:
#     git tag v0.1.0 origin/main
#     git push origin v0.1.0
#   -> Bu workflow başlar, image tag = pushlanan tag adı.
#
# Image versioning: git describe --tags (push edilen tag adı).
#
# Acil durumda: workflow_dispatch ile UI'dan manuel çalıştırılabilir.
# Tag input ZORUNLU — tag-bazlı deploy modelinden sapılmaz.
#
# Pattern source: github.com/<caliptic>/.github/workflows/deploy-prod.yml
#   — aynı self-hosted bastion runner, aynı oc-login + docker push + rollout
#     akışı. Caliptic backend/web/daemon yerine bizde web/api/game-server.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag to deploy (e.g. v0.1.0). Required."
        required: true
        type: string

permissions:
  contents: read

env:
  # External route — used to push images FROM bastion to OpenShift registry
  REGISTRY: ${{ secrets.OPENSHIFT_REGISTRY }}
  # Internal registry — used by OCP pods to pull (cluster-internal DNS)
  INTERNAL_REGISTRY: image-registry.openshift-image-registry.svc:5000
  NAMESPACE: ${{ secrets.OPENSHIFT_NAMESPACE }}
  WEB_IMAGE: nebula-web
  API_IMAGE: nebula-api
  GAME_IMAGE: nebula-game-server

jobs:
  deploy:
    name: Build & Deploy to OpenShift
    runs-on: [self-hosted, bastion]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Tag push: github.ref = refs/tags/v* (auto). workflow_dispatch:
          # use the required `tag` input. Either way, deploy is tag-scoped.
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set image tag
        id: meta
        run: |
          echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> $GITHUB_OUTPUT

      # ── OpenShift login ────────────────────────────────────────────────────
      # redhat-actions/oc-login@v1 still ships with `using: node20` (no v2 or
      # Node 24 release as of 2026-05). Force the GitHub Actions runner to
      # execute it under Node 24 anyway — this opts in to the runtime that
      # becomes the default on 2026-06-02 and removes the deprecation warning.
      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: ${{ env.NAMESPACE }}
          insecure_skip_tls_verify: false

      # ── OpenShift in-cluster builds (no Docker on bastion) ────────────────
      # Previously this workflow shelled out to `docker build` on the bastion
      # runner, requiring docker-ce + buildx + the image registry route
      # exposed externally. A cluster crash recovery exposed that whole
      # chain as brittle: a fresh runner VM meant a fresh docker install
      # before any deploy could succeed.
      #
      # Replaced with binary BuildConfigs (deploy/openshift/09-builds.tf):
      # `oc start-build --from-dir=. --follow` uploads the checked-out
      # working tree to a build pod inside the cluster, which runs the
      # Dockerfile and pushes the result to the internal ImageStream.
      # Runner needs only `oc` and `git` now.
      #
      # The `oc tag` step preserves the per-commit tag so historical
      # versions remain pullable for rollback (otherwise BuildConfig only
      # ever updates `:latest`).
      - name: Build api in-cluster
        run: |
          oc start-build nebula-api \
            --from-dir=. \
            --wait \
            -n "$NAMESPACE"
          oc tag "${NAMESPACE}/nebula-api:latest" \
                 "${NAMESPACE}/nebula-api:${{ steps.meta.outputs.tag }}" \
            -n "$NAMESPACE"

      - name: Build game-server in-cluster
        run: |
          oc start-build nebula-game-server \
            --from-dir=. \
            --wait \
            -n "$NAMESPACE"
          oc tag "${NAMESPACE}/nebula-game-server:latest" \
                 "${NAMESPACE}/nebula-game-server:${{ steps.meta.outputs.tag }}" \
            -n "$NAMESPACE"

      # NEXT_PUBLIC_* must be passed as build args because Next.js inlines
      # them into the client bundle at `next build` — runtime env vars in
      # the standalone runner stage are too late. Empty values fall through
      # and leave the corresponding integration silent.
      - name: Build web in-cluster
        run: |
          oc start-build nebula-web \
            --from-dir=. \
            --wait \
            --build-arg=NEXT_PUBLIC_API_URL="https://api-nebula.caliptic.com" \
            --build-arg=NEXT_PUBLIC_GAME_SERVER_URL="https://game-nebula.caliptic.com" \
            --build-arg=NEXT_PUBLIC_GA_ID="${{ secrets.NEXT_PUBLIC_GA_ID }}" \
            --build-arg=NEXT_PUBLIC_FB_PIXEL_ID="${{ secrets.NEXT_PUBLIC_FB_PIXEL_ID }}" \
            --build-arg=NEXT_PUBLIC_SENTRY_DSN="${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" \
            --build-arg=NEXT_PUBLIC_SENTRY_ENV="production" \
            --build-arg=NEXT_PUBLIC_SENTRY_RELEASE="${{ steps.meta.outputs.version }}" \
            -n "$NAMESPACE"
          oc tag "${NAMESPACE}/nebula-web:latest" \
                 "${NAMESPACE}/nebula-web:${{ steps.meta.outputs.tag }}" \
            -n "$NAMESPACE"

      # ── Sync runtime config ────────────────────────────────────────────────
      # TypeORM migrations run on api boot (DB_RUN_MIGRATIONS=true in the
      # nebula-shared ConfigMap) so no separate migration step is required.
      # If a destructive migration ever ships we'd add a one-off pod step
      # here, mirroring Caliptic's `migrate up` pattern.

      - name: Sync api/game-server env
        run: |
          # Patch live env vars on each deploy — these are CONFIG, not
          # secrets, and we want them to drift to current values without
          # waiting for a Terraform apply.
          oc set env deployment/nebula-api \
            CORS_ORIGINS="https://nebula.caliptic.com" \
            NEXT_PUBLIC_API_URL="https://api-nebula.caliptic.com" \
            NEXT_PUBLIC_GAME_SERVER_URL="https://game-nebula.caliptic.com" \
            APP_VERSION="${{ steps.meta.outputs.version }}" \
            -n "$NAMESPACE" || true

          oc set env deployment/nebula-game-server \
            APP_VERSION="${{ steps.meta.outputs.version }}" \
            -n "$NAMESPACE" || true

      # ── Rollout helper (DRY) ──────────────────────────────────────────────
      # Earlier the 3 deploy steps just ran `oc rollout status …`; when the
      # rollout timed out the step exited 1 with NO diagnostic info, so the
      # GitHub Actions log showed only "error: timed out waiting for the
      # condition" — useless for triage.  Run 26379612897 hit that with
      # game-server stuck mid-rollout for 5 minutes and gave us nothing.
      # The shared function below dumps pod state, recent events, and the
      # last 200 log lines of any non-Running pod when the rollout fails,
      # then re-raises the failure so the job still surfaces red.
      #
      # Timeout bumped from 300s → 600s because game-server's first boot
      # after a fresh image runs DB schema validation + the resource-tick
      # cron's first wake — both add ~10-30s and can push the readiness
      # probe past 5 minutes on a cold cluster.
      - name: Define rollout helpers
        run: |
          # Source-into-env idiom: write a script file and `source` it from
          # subsequent steps.  GitHub Actions bash steps are independent
          # shells, so we can't define a function once and reuse it; the
          # helper has to live on disk.
          cat > /tmp/rollout-helpers.sh <<'BASH'
          set -euo pipefail

          # rollout_with_diag <deployment-name>
          rollout_with_diag() {
            local dep="$1"
            local ns="${NAMESPACE}"
            echo "→ Waiting on rollout for ${dep} (10-minute timeout)…"
            if oc rollout status deployment/"${dep}" -n "${ns}" --timeout=600s; then
              echo "✅ ${dep} rolled out"
              return 0
            fi
            local exit_code=$?
            echo ""
            echo "❌ Rollout for ${dep} FAILED — collecting diagnostics."
            echo ""
            echo "─── Deployment status ──────────────────────────────────"
            oc get deployment/"${dep}" -n "${ns}" -o wide || true
            echo ""
            echo "─── Pods (full label match) ────────────────────────────"
            oc get pods -n "${ns}" -l app="${dep}" -o wide || true
            echo ""
            echo "─── Recent events (last 25, namespace-wide) ────────────"
            oc get events -n "${ns}" --sort-by=.lastTimestamp \
              -o custom-columns=TIME:.lastTimestamp,TYPE:.type,REASON:.reason,OBJECT:.involvedObject.name,MSG:.message \
              | tail -25 || true
            echo ""
            echo "─── Describe non-Ready pods ────────────────────────────"
            local bad_pods
            bad_pods=$(oc get pods -n "${ns}" -l app="${dep}" \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.phase}{"\n"}{end}' \
              | awk '$2!="Running"{print $1}' || true)
            if [ -n "${bad_pods:-}" ]; then
              for p in $bad_pods; do
                echo "── describe pod/${p} ──"
                oc describe pod/"${p}" -n "${ns}" | tail -60 || true
                echo ""
                echo "── logs pod/${p} (last 200) ──"
                oc logs pod/"${p}" -n "${ns}" --tail=200 --all-containers=true 2>&1 || true
                echo ""
              done
            else
              # Race: pods all Running but probe still failing.  Tail
              # logs of every replica anyway — they ran SOMETHING.
              for p in $(oc get pods -n "${ns}" -l app="${dep}" -o name); do
                echo "── logs ${p} (last 200) ──"
                oc logs "${p}" -n "${ns}" --tail=200 --all-containers=true 2>&1 || true
                echo ""
              done
            fi
            echo ""
            echo "─── End diagnostics — failing job ─────────────────────"
            return "${exit_code}"
          }

          export -f rollout_with_diag
          BASH

      # ── Deploy api ─────────────────────────────────────────────────────────
      - name: Deploy api
        run: |
          source /tmp/rollout-helpers.sh
          if oc get deployment nebula-api -n "$NAMESPACE" &>/dev/null; then
            oc set image deployment/nebula-api \
              api="${{ env.INTERNAL_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }}" \
              -n "$NAMESPACE"
            rollout_with_diag nebula-api
          else
            echo "Deployment nebula-api not found — run terraform apply first (initial install)"
            exit 1
          fi

      # ── Deploy game-server ─────────────────────────────────────────────────
      - name: Deploy game-server
        run: |
          source /tmp/rollout-helpers.sh
          if oc get deployment nebula-game-server -n "$NAMESPACE" &>/dev/null; then
            oc set image deployment/nebula-game-server \
              game-server="${{ env.INTERNAL_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.GAME_IMAGE }}:${{ steps.meta.outputs.tag }}" \
              -n "$NAMESPACE"
            rollout_with_diag nebula-game-server
          else
            echo "Deployment nebula-game-server not found — run terraform apply first (initial install)"
            exit 1
          fi

      # ── Deploy web ─────────────────────────────────────────────────────────
      - name: Deploy web
        run: |
          source /tmp/rollout-helpers.sh
          if oc get deployment nebula-web -n "$NAMESPACE" &>/dev/null; then
            oc set image deployment/nebula-web \
              web="${{ env.INTERNAL_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.tag }}" \
              -n "$NAMESPACE"
            rollout_with_diag nebula-web
          else
            echo "Deployment nebula-web not found — run terraform apply first (initial install)"
            exit 1
          fi

      # ── Smoke test ─────────────────────────────────────────────────────────
      # Per-host probe path — both NestJS backends 404 on `/` because they
      # mount their routes under prefixes (api/v1 for the REST API,
      # api for the game-server). Hit each service's documented liveness
      # surface so the smoke test reflects actual reachability instead of
      # a misleading 404 from the root.
      - name: Smoke test
        run: |
          sleep 5
          for entry in \
            "nebula.caliptic.com:/" \
            "api-nebula.caliptic.com:/api/docs" \
            "game-nebula.caliptic.com:/api/health"; do
            host="${entry%%:*}"
            path="${entry#*:}"
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${host}${path}" || echo "000")
            echo "https://${host}${path} → HTTP ${STATUS}"
            # 2xx, 3xx (redirects), and 401 (api endpoints requiring auth)
            # are all acceptable post-deploy. 404/5xx fail the smoke test.
            case "$STATUS" in
              2*|3*|401|405) echo "✅ ${host} reachable" ;;
              *) echo "❌ ${host}${path} returned ${STATUS}" ; exit 1 ;;
            esac
          done

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment successful :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Web:** \`${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.tag }}\` → https://nebula.caliptic.com" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** \`${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }}\` → https://api-nebula.caliptic.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Game:** \`${{ env.GAME_IMAGE }}:${{ steps.meta.outputs.tag }}\` → https://game-nebula.caliptic.com" >> $GITHUB_STEP_SUMMARY
