name: Deploy Nginx Config

on:
  push:
    branches:
      - main
    paths:
      - 'deploy/nginx/**'
      - '.github/workflows/nginx-bastion.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Install Nebula nginx config on bastion
    runs-on: [self-hosted, bastion]
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pre-flight syntax check
        # `nginx -t` actually opens declared log files (not just parse the
        # syntax), so the access_log /var/log/nginx/* directives in the
        # vhost config fail with EACCES when this step runs as the
        # non-root runner user.  Rewrite the log paths into TMP_DIR for
        # the pre-flight check only — the live install on bastion runs
        # via sudo and keeps the original paths.
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          mkdir -p "$TMP_DIR/conf.d" "$TMP_DIR/logs"
          cp deploy/nginx/nebula-dominion.conf "$TMP_DIR/conf.d/"
          cp deploy/nginx/00-nebula-maps.conf  "$TMP_DIR/conf.d/"
          # Redirect every "/var/log/nginx/" → "$TMP_DIR/logs/" so the
          # writability test succeeds without touching the real log dir.
          sed -i "s|/var/log/nginx/|$TMP_DIR/logs/|g" "$TMP_DIR/conf.d/"*.conf
          cat > "$TMP_DIR/nginx.conf" <<EOF
          worker_processes 1;
          error_log $TMP_DIR/error.log warn;
          pid $TMP_DIR/nginx.pid;
          events { worker_connections 64; }
          http {
            include $TMP_DIR/conf.d/*.conf;
          }
          EOF
          nginx -t -c "$TMP_DIR/nginx.conf" -p "$TMP_DIR"

      - name: Install + reload nginx
        run: |
          sudo bash deploy/nginx/install.sh

      - name: Smoke test vhosts
        run: |
          for host in nebula.caliptic.com api-nebula.caliptic.com game-nebula.caliptic.com; do
            STATUS=$(curl -sI -o /dev/null -w "%{http_code}" \
                          -H "Host: ${host}" \
                          --max-time 5 \
                          http://127.0.0.1/ || echo "000")
            echo "Host: ${host} -> HTTP ${STATUS}"
            case "$STATUS" in
              2*|3*|401|404|405) echo "  vhost OK" ;;
              502|503|504)       echo "  upstream unhealthy"; exit 1 ;;
              000|"")            echo "  nginx not responding"; exit 1 ;;
              *)                 echo "  unexpected ${STATUS} - continuing" ;;
            esac
          done
