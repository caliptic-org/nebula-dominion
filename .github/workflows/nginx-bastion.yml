name: Deploy Nginx Config

on:
  push:
    branches: [main]
    paths:
      - 'deploy/nginx/**'
      - '.github/workflows/nginx-bastion.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Install nebula-dominion nginx vhost on bastion
    runs-on: [self-hosted, bastion]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pre-flight syntax check
        # `nginx -t` actually opens declared log files AND binds the listen
        # sockets AND reads the ssl_certificate paths.  None of that flies
        # for a non-root runner that doesn't have the Let's Encrypt cert,
        # can't write into /var/log/nginx/, and can't grab :443.  Rewrite
        # the copied conf into an unprivileged shape just for the syntax
        # check; the real install on bastion runs as root and keeps the
        # original directives untouched.
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          mkdir -p "$TMP_DIR/conf.d" "$TMP_DIR/logs"
          cp deploy/nginx/nebula-dominion.conf "$TMP_DIR/conf.d/"

          conf="$TMP_DIR/conf.d/nebula-dominion.conf"

          # Strip ssl_* directives entirely (cert path doesn't exist here).
          sed -i '/ssl_certificate\b/d; /ssl_certificate_key\b/d; /ssl_protocols\b/d; /ssl_ciphers\b/d' "$conf"
          # Demote 443 ssl → 18443 (plain HTTP) so the runner can bind.
          sed -i 's|listen 443 ssl;|listen 18443;|g' "$conf"
          # Demote :80 redirect listener too.
          sed -i 's|listen 80;|listen 18080;|g' "$conf"
          # Stub upstream — the real ocp_ingress lives in ocp-proxy.conf
          # which isn't checked out here, so the test must own one.
          echo 'upstream ocp_ingress { server 127.0.0.1:1; }' > "$TMP_DIR/conf.d/_stub.conf"
          # Stub the connection_upgrade map ocp-proxy.conf normally provides.
          cat >> "$TMP_DIR/conf.d/_stub.conf" <<'EOF'
          map $http_upgrade $connection_upgrade {
              default upgrade;
              ''      close;
          }
          EOF

          cat > "$TMP_DIR/nginx.conf" <<EOF
          worker_processes 1;
          error_log $TMP_DIR/error.log warn;
          pid $TMP_DIR/nginx.pid;
          events { worker_connections 64; }
          http {
            include $TMP_DIR/conf.d/*.conf;
          }
          EOF
          nginx -t -c "$TMP_DIR/nginx.conf" -p "$TMP_DIR"

      - name: Install + reload
        run: sudo bash deploy/nginx/install.sh

      - name: Smoke test (bastion-local)
        # Probe via Host header against 127.0.0.1:443 so we exercise the
        # real ssl listener that just got installed.  -k tolerates the
        # self-signed cert path inside the cluster (Cloudflare is what
        # presents the public-trusted cert).
        run: |
          for host in nebula.caliptic.com api-nebula.caliptic.com game-nebula.caliptic.com; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
                          --resolve "${host}:443:127.0.0.1" \
                          --max-time 8 \
                          "https://${host}/" || echo "000")
            echo "${host} -> HTTP ${STATUS}"
            case "$STATUS" in
              2*|3*|401|404|405) echo "  vhost OK" ;;
              502|503|504)       echo "  upstream unhealthy (OCP route down?)"; exit 1 ;;
              000|"")            echo "  nginx unreachable"; exit 1 ;;
              *)                 echo "  unexpected ${STATUS} - continuing" ;;
            esac
          done
