---
- name: Add Caddy apt repository key
  get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy.asc
    mode: '0644'

- name: Add Caddy apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/caddy.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present
    filename: caddy

- name: Install Caddy
  apt:
    name: caddy
    state: present
    update_cache: yes

- name: Configure Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: '0644'
  notify: restart caddy

- name: Create Caddy data directory
  file:
    path: /data/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: '0755'

- name: Enable and start Caddy
  systemd:
    name: caddy
    state: started
    enabled: yes
