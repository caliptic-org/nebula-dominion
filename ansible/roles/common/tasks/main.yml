---
- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts with cluster nodes
  blockinfile:
    path: /etc/hosts
    block: |
      {{ server1_private_ip }} server1 server1.local
      {{ server2_private_ip }} server2 server2.local
      {{ server1_private_ip }} registry.local
    marker: "# {mark} ANSIBLE MANAGED CLUSTER HOSTS"

- name: Set timezone
  timezone:
    name: "{{ system_timezone }}"

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes

- name: Install common packages
  apt:
    name: "{{ common_packages }}"
    state: present

- name: Create deploy user
  user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    groups: "sudo"
    append: yes
    create_home: yes
    state: present

- name: Add deploy user to sudoers (no password)
  copy:
    content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL\n"
    dest: "/etc/sudoers.d/{{ deploy_user }}"
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Configure SSH hardening
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: '0600'
  notify: restart sshd

- name: Configure NTP
  template:
    src: ntp.conf.j2
    dest: /etc/ntp.conf
  notify: restart ntp

- name: Enable and start NTP
  service:
    name: ntp
    state: started
    enabled: yes

- name: Configure UFW defaults
  ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow outgoing traffic
  ufw:
    policy: allow
    direction: outgoing

- name: Allow SSH from allowed IPs
  ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ allowed_ssh_ips }}"
  when: allowed_ssh_ips | length > 0

- name: Allow SSH from anywhere if no IP restrictions
  ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
  when: allowed_ssh_ips | length == 0

- name: Allow HTTP/HTTPS from Cloudflare
  ufw:
    rule: allow
    port: "{{ item[0] }}"
    proto: tcp
    src: "{{ item[1] }}"
  loop: "{{ ['80', '443'] | product(cloudflare_ipv4_ranges) | list }}"

- name: Allow all traffic on private network
  ufw:
    rule: allow
    src: "{{ private_network_cidr }}"

- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban

- name: Enable and start fail2ban
  service:
    name: fail2ban
    state: started
    enabled: yes

- name: Set kernel parameters for performance
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: "net.core.somaxconn", value: "65535" }
    - { key: "net.ipv4.tcp_max_syn_backlog", value: "65535" }
    - { key: "vm.swappiness", value: "10" }
    - { key: "vm.dirty_ratio", value: "15" }
    - { key: "vm.dirty_background_ratio", value: "5" }
    - { key: "net.ipv4.ip_local_port_range", value: "1024 65535" }
    - { key: "net.ipv4.tcp_tw_reuse", value: "1" }
    - { key: "fs.file-max", value: "1048576" }
    - { key: "net.core.netdev_max_backlog", value: "65535" }

- name: Set system limits
  template:
    src: limits.conf.j2
    dest: /etc/security/limits.d/99-nebula.conf

- name: Create data directory structure
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /data
    - /data/backups
    - /data/logs

- name: Configure LVM for data disk
  include_tasks: lvm.yml
  when: configure_lvm | default(false)

- name: Install node_exporter for monitoring
  include_tasks: node_exporter.yml

- name: Disable swap
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'
