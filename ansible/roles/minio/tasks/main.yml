---
- name: Create minio user
  user:
    name: minio
    system: yes
    shell: /sbin/nologin
    create_home: no

- name: Create MinIO data directories
  file:
    path: "{{ item }}"
    state: directory
    owner: minio
    group: minio
    mode: '0755'
  loop:
    - "{{ minio_data_dir }}/disk1"
    - "{{ minio_data_dir }}/disk2"
    - /etc/minio

- name: Download MinIO binary
  get_url:
    url: "https://dl.min.io/server/minio/release/linux-amd64/minio"
    dest: /usr/local/bin/minio
    mode: '0755'

- name: Download MinIO client (mc)
  get_url:
    url: "https://dl.min.io/client/mc/release/linux-amd64/mc"
    dest: /usr/local/bin/mc
    mode: '0755'

- name: Configure MinIO environment
  template:
    src: minio.env.j2
    dest: /etc/minio/minio.env
    owner: minio
    group: minio
    mode: '0640'
  notify: restart minio

- name: Create MinIO systemd service
  template:
    src: minio.service.j2
    dest: /etc/systemd/system/minio.service
  notify: restart minio

- name: Enable and start MinIO
  systemd:
    name: minio
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for MinIO to be ready
  uri:
    url: "http://{{ ansible_host }}:{{ minio_port }}/minio/health/live"
    status_code: 200
  register: minio_health
  until: minio_health.status == 200
  retries: 20
  delay: 10

- name: Configure MinIO client alias
  command: mc alias set local http://{{ ansible_host }}:{{ minio_port }} {{ minio_root_user }} {{ minio_root_password }}
  become_user: minio
  ignore_errors: yes

- name: Create default buckets
  command: mc mb --ignore-existing local/{{ item }}
  become_user: minio
  loop:
    - nebula-assets
    - nebula-backups
    - nebula-uploads
  ignore_errors: yes

- name: Allow MinIO ports on private network
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    src: "{{ private_network_cidr }}"
  loop:
    - "{{ minio_port }}"
    - "{{ minio_console_port }}"
