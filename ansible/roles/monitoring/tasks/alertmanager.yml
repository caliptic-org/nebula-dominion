---
- name: Create alertmanager user
  user:
    name: alertmanager
    system: yes
    shell: /sbin/nologin
    create_home: no

- name: Download Alertmanager
  get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
    dest: /tmp/alertmanager.tar.gz

- name: Extract Alertmanager
  unarchive:
    src: /tmp/alertmanager.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install Alertmanager binary
  copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/alertmanager"
    dest: /usr/local/bin/alertmanager
    mode: '0755'
    remote_src: yes

- name: Create Alertmanager data directory
  file:
    path: /data/alertmanager
    state: directory
    owner: alertmanager
    group: alertmanager

- name: Configure Alertmanager
  template:
    src: alertmanager.yml.j2
    dest: /etc/alertmanager/alertmanager.yml
    owner: alertmanager
    group: alertmanager
    mode: '0640'
  notify: restart alertmanager

- name: Create Alertmanager systemd service
  copy:
    content: |
      [Unit]
      Description=Prometheus Alertmanager
      After=network.target

      [Service]
      User=alertmanager
      Group=alertmanager
      ExecStart=/usr/local/bin/alertmanager \
        --config.file=/etc/alertmanager/alertmanager.yml \
        --storage.path=/data/alertmanager \
        --cluster.advertise-address={{ ansible_host }}:9094
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/alertmanager.service

- name: Enable and start Alertmanager
  systemd:
    name: alertmanager
    state: started
    enabled: yes
    daemon_reload: yes
