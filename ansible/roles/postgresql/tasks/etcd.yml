---
- name: Create etcd user
  user:
    name: etcd
    system: yes
    shell: /sbin/nologin
    create_home: no

- name: Create etcd directories
  file:
    path: "{{ item }}"
    state: directory
    owner: etcd
    group: etcd
    mode: '0755'
  loop:
    - "{{ etcd_data_dir }}"
    - /etc/etcd

- name: Download etcd
  get_url:
    url: "https://github.com/etcd-io/etcd/releases/download/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-amd64.tar.gz"
    dest: /tmp/etcd.tar.gz
    mode: '0644'

- name: Extract etcd
  unarchive:
    src: /tmp/etcd.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Install etcd binaries
  copy:
    src: "/tmp/etcd-v{{ etcd_version }}-linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    remote_src: yes
  loop:
    - etcd
    - etcdctl

- name: Configure etcd
  template:
    src: etcd.conf.j2
    dest: /etc/etcd/etcd.conf
    owner: etcd
    group: etcd
    mode: '0640'

- name: Create etcd systemd service
  template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service

- name: Enable and start etcd
  systemd:
    name: etcd
    state: started
    enabled: yes
    daemon_reload: yes

- name: Allow etcd ports on private network
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    src: "{{ private_network_cidr }}"
  loop:
    - "2379"  # client
    - "2380"  # peer
