---
- name: Install PostgreSQL dependencies
  apt:
    name:
      - python3-psycopg2
      - python3-pip
      - libpq-dev
    state: present

- name: Add PostgreSQL apt repository key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/keyrings/postgresql.asc
    mode: '0644'

- name: Add PostgreSQL apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/postgresql.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install PostgreSQL
  apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-client-{{ postgresql_version }}"
      - "postgresql-contrib-{{ postgresql_version }}"
    state: present
    update_cache: yes

- name: Stop PostgreSQL (Patroni will manage it)
  systemd:
    name: "postgresql@{{ postgresql_version }}-main"
    state: stopped
    enabled: no

- name: Create PostgreSQL data directory
  file:
    path: "{{ postgresql_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'

- name: Install etcd
  include_tasks: etcd.yml

- name: Install Patroni
  include_tasks: patroni.yml

- name: Install and configure postgres_exporter
  include_tasks: postgres_exporter.yml
