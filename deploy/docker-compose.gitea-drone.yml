version: '3.9'

networks:
  cicd-net:
    driver: bridge
  registry-net:
    driver: bridge

volumes:
  gitea-data:
  gitea-config:
  drone-data:
  registry-data:
  drone-runner-data:

services:
  # ─────────────────────────────────────────────
  # Gitea — Self-hosted Git
  # ─────────────────────────────────────────────
  gitea:
    image: gitea/gitea:1.21-rootless
    container_name: gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea-db:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD}
      - GITEA__server__DOMAIN=${GITEA_DOMAIN:-gitea.local}
      - GITEA__server__ROOT_URL=http://${GITEA_DOMAIN:-gitea.local}:3000
      - GITEA__server__SSH_DOMAIN=${GITEA_DOMAIN:-gitea.local}
      - GITEA__server__LFS_START_SERVER=true
      - GITEA__lfs__STORAGE_TYPE=local
      - GITEA__repository__ENABLE_PUSH_CREATE_USER=true
      - GITEA__repository__ENABLE_PUSH_CREATE_ORG=true
      - GITEA__webhook__ALLOWED_HOST_LIST=private
      - GITEA__webhook__DELIVER_TIMEOUT=30
      - GITEA__mailer__ENABLED=false
      - GITEA__service__DISABLE_REGISTRATION=false
      - GITEA__service__REQUIRE_SIGNIN_VIEW=false
    ports:
      - "3000:3000"
      - "2222:2222"
    volumes:
      - gitea-data:/var/lib/gitea
      - gitea-config:/etc/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - cicd-net
    depends_on:
      gitea-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  gitea-db:
    image: postgres:16-alpine
    container_name: gitea-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=${GITEA_DB_PASSWORD}
      - POSTGRES_DB=gitea
    volumes:
      - ./gitea-db-data:/var/lib/postgresql/data
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Drone CI Server
  # ─────────────────────────────────────────────
  drone:
    image: drone/drone:2
    container_name: drone
    restart: unless-stopped
    environment:
      - DRONE_GITEA_SERVER=http://gitea:3000
      - DRONE_GITEA_CLIENT_ID=${DRONE_GITEA_CLIENT_ID}
      - DRONE_GITEA_CLIENT_SECRET=${DRONE_GITEA_CLIENT_SECRET}
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}
      - DRONE_SERVER_HOST=${DRONE_DOMAIN:-drone.local}:80
      - DRONE_SERVER_PROTO=http
      - DRONE_DATABASE_DRIVER=postgres
      - DRONE_DATABASE_DATASOURCE=postgres://drone:${DRONE_DB_PASSWORD}@drone-db:5432/drone?sslmode=disable
      - DRONE_LOGS_DEBUG=false
      - DRONE_AGENTS_ENABLED=true
      - DRONE_STATUS_NAME=continuous-integration/drone
      - DRONE_CLEANUP_DEADLINE_RUNNING=24h
      - DRONE_CLEANUP_DEADLINE_PENDING=24h
    ports:
      - "8080:80"
    volumes:
      - drone-data:/data
    networks:
      - cicd-net
    depends_on:
      drone-db:
        condition: service_healthy
      gitea:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  drone-db:
    image: postgres:16-alpine
    container_name: drone-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=drone
      - POSTGRES_PASSWORD=${DRONE_DB_PASSWORD}
      - POSTGRES_DB=drone
    volumes:
      - ./drone-db-data:/var/lib/postgresql/data
    networks:
      - cicd-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Drone Runner (Docker runner)
  # ─────────────────────────────────────────────
  drone-runner:
    image: drone/drone-runner-docker:1
    container_name: drone-runner
    restart: unless-stopped
    environment:
      - DRONE_RPC_PROTO=http
      - DRONE_RPC_HOST=drone:80
      - DRONE_RPC_SECRET=${DRONE_RPC_SECRET}
      - DRONE_RUNNER_CAPACITY=4
      - DRONE_RUNNER_NAME=docker-runner-01
      - DRONE_LOGS_DEBUG=false
      - DRONE_LOGS_TRACE=false
      - DRONE_RUNNER_NETWORKS=cicd-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - drone-runner-data:/data
    networks:
      - cicd-net
    depends_on:
      drone:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Internal Docker Registry
  # ─────────────────────────────────────────────
  registry:
    image: registry:2
    container_name: docker-registry
    restart: unless-stopped
    environment:
      - REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY=/var/lib/registry
      - REGISTRY_HTTP_ADDR=0.0.0.0:5000
      - REGISTRY_STORAGE_DELETE_ENABLED=true
      - REGISTRY_HTTP_HEADERS_X-Content-Type-Options=[nosniff]
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
      - ./registry/config.yml:/etc/docker/registry/config.yml:ro
    networks:
      - cicd-net
      - registry-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 10s
      retries: 3

  registry-ui:
    image: joxit/docker-registry-ui:main
    container_name: registry-ui
    restart: unless-stopped
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_TITLE=Nebula Dominion Registry
      - REGISTRY_URL=http://registry:5000
      - SHOW_CONTENT_DIGEST=true
      - NGINX_PROXY_PASS_URL=http://registry:5000
      - SHOW_CATALOG_NB_TAGS=true
      - CATALOG_MIN_BRANCHES=1
      - CATALOG_MAX_BRANCHES=1
      - TAGLIST_PAGE_SIZE=100
      - REGISTRY_SECURED=false
      - CATALOG_ELEMENTS_LIMIT=1000
    ports:
      - "8081:80"
    networks:
      - cicd-net
    depends_on:
      - registry
