# /etc/nginx/conf.d/00-nebula-maps.conf
#
# Optional companion to nebula-dominion.conf — provides the
# `$connection_upgrade` map required by the game-server WebSocket vhost.
#
# DEPLOY THIS ONLY IF stock nginx.conf doesn't already define the map.
# Quick check on the bastion:
#
#   sudo grep -R 'connection_upgrade' /etc/nginx/ | grep -v 'nebula-'
#
# Empty output → safe to install this file.
# Any hit (especially in nginx.conf or another conf.d/*.conf) → SKIP this
# file; nginx will throw "duplicate map directive" on reload.
#
# The `00-` filename prefix loads it before nebula-dominion.conf alphabetically,
# so the map is defined by the time the server blocks reference it.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
