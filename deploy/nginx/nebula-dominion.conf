# /etc/nginx/sites-available/nebula-dominion.conf
# Symlink: /etc/nginx/sites-enabled/nebula-dominion.conf
#         -> /etc/nginx/sites-available/nebula-dominion.conf
#
# Mirrors the pattern of /etc/nginx/sites-available/ocp-proxy.conf so the
# whole bastion uses one consistent shape: same upstream (`ocp_ingress`,
# defined in ocp-proxy.conf — DO NOT REDEFINE here, nginx 1.x emits a
# "duplicate upstream" error), same Let's Encrypt cert, same SNI +
# proxy_redirect rewrites, same WebSocket plumbing.
#
# Each Nebula route lands on a distinct OCP Route hostname; nginx
# forwards traffic to ocp_ingress (10.10.10.50:443) and signals which
# Route to pick via SNI (`proxy_ssl_name`) + Host header.  Cloudflare
# tunnel terminates the public cert at *.caliptic.com → bastion :443.

# ── nebula.caliptic.com → Next.js web app ────────────────────────────────────
server {
    listen 443 ssl;
    server_name nebula.caliptic.com;

    ssl_certificate     /etc/letsencrypt/live/caliptic-bastion/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caliptic-bastion/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Next.js streaming responses (RSC, suspense) — larger buffer keeps
    # chunks flowing without head-of-line blocking.
    proxy_buffers            16 64k;
    proxy_buffer_size        128k;
    proxy_busy_buffers_size  256k;

    location / {
        proxy_pass          https://ocp_ingress;
        proxy_http_version  1.1;
        proxy_ssl_verify    off;

        # SNI — routes to the nebula-web Route inside OCP.
        proxy_ssl_server_name on;
        proxy_ssl_name        nebula-web-nebula-prod.apps.ocp-sno.caliptic.com;

        proxy_set_header Host               nebula-web-nebula-prod.apps.ocp-sno.caliptic.com;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;

        # Keep the browser pinned to the short domain — any self-referential
        # Route redirects get rewritten back to nebula.caliptic.com.
        proxy_redirect https://nebula-web-nebula-prod.apps.ocp-sno.caliptic.com/
                       https://nebula.caliptic.com/;
    }
}

# ── api-nebula.caliptic.com → NestJS REST API + JWT ──────────────────────────
server {
    listen 443 ssl;
    server_name api-nebula.caliptic.com;

    ssl_certificate     /etc/letsencrypt/live/caliptic-bastion/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caliptic-bastion/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # JWT bodies are small; avatar uploads need ~10MB headroom.
    client_max_body_size 10m;

    location / {
        proxy_pass          https://ocp_ingress;
        proxy_http_version  1.1;
        proxy_ssl_verify    off;

        proxy_ssl_server_name on;
        proxy_ssl_name        nebula-api-nebula-prod.apps.ocp-sno.caliptic.com;

        proxy_set_header Host               nebula-api-nebula-prod.apps.ocp-sno.caliptic.com;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;

        proxy_redirect https://nebula-api-nebula-prod.apps.ocp-sno.caliptic.com/
                       https://api-nebula.caliptic.com/;
    }
}

# ── game-nebula.caliptic.com → NestJS socket.io + REST ───────────────────────
server {
    listen 443 ssl;
    server_name game-nebula.caliptic.com;

    ssl_certificate     /etc/letsencrypt/live/caliptic-bastion/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caliptic-bastion/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Long timeouts for WebSocket connections (matchmaking queues + in-battle
    # ticks).  Matches the 5-minute haproxy.router.openshift.io/timeout
    # annotation on the nebula-game-server Route.
    proxy_read_timeout  3600;
    proxy_send_timeout  3600;

    location / {
        proxy_pass          https://ocp_ingress;
        proxy_http_version  1.1;
        proxy_ssl_verify    off;

        proxy_ssl_server_name on;
        proxy_ssl_name        nebula-game-server-nebula-prod.apps.ocp-sno.caliptic.com;

        proxy_set_header Host               nebula-game-server-nebula-prod.apps.ocp-sno.caliptic.com;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;

        # WebSocket upgrade (uses the connection_upgrade map already defined
        # at the http {} level — same map ocp-proxy.conf relies on).
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;

        proxy_redirect https://nebula-game-server-nebula-prod.apps.ocp-sno.caliptic.com/
                       https://game-nebula.caliptic.com/;
    }
}

# ── HTTP → HTTPS redirect (all three Nebula domains) ─────────────────────────
server {
    listen 80;
    server_name nebula.caliptic.com api-nebula.caliptic.com game-nebula.caliptic.com;
    return 301 https://$host$request_uri;
}
