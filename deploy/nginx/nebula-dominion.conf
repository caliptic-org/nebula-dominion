# /etc/nginx/conf.d/nebula-dominion.conf
#
# Nebula Dominion — bastion nginx reverse proxy config (drop-in).
#
# This file is the ONLY nginx config Nebula owns on the bastion VM.  It does
# NOT modify nginx.conf, the default server block, or any other project's
# config — drop it into /etc/nginx/conf.d/ and reload, no conflicts.
#
# Architecture recap:
#
#   Cloudflare tunnel  →  bastion nginx  →  OpenShift HAProxy
#   ─────────────────     ─────────────     ────────────────
#   nebula.caliptic.com   :443 here         nebula-web-nebula-prod
#                                              .apps.ocp-sno.caliptic.com
#
# The cluster route uses the OpenShift wildcard cert (*.apps.<cluster>) so
# the upstream is HTTPS.  We strip the public certificate at the Cloudflare
# tunnel layer; nginx ↔ HAProxy traffic on the internal network is HTTPS
# with `proxy_ssl_verify off` (the cluster wildcard cert is self-signed
# from nginx's perspective).
#
# ── Deploy ─────────────────────────────────────────────────────────────────
#
#   # On the bastion (as root or via sudo):
#   sudo cp deploy/nginx/nebula-dominion.conf /etc/nginx/conf.d/
#   sudo nginx -t                  # syntax check
#   sudo systemctl reload nginx    # apply without dropping connections
#
# To remove cleanly:
#
#   sudo rm /etc/nginx/conf.d/nebula-dominion.conf
#   sudo systemctl reload nginx
#
# ── Isolation guarantees ───────────────────────────────────────────────────
#
# 1. Every server block uses an explicit `server_name` — no catch-all (`_`)
#    or default-server flag — so this file CANNOT swallow traffic destined
#    for caliptic.com, api.caliptic.com, or any other project on the box.
# 2. Upstreams have a unique `nebula_*` prefix; no risk of name collision
#    with another project's upstream.
# 3. Log files live under /var/log/nginx/nebula-*.log so log rotation +
#    debugging are scoped to this app.

# ── Upstreams ──────────────────────────────────────────────────────────────
# Define once, reference multiple times.  Resolves DNS lazily so the bastion
# doesn't need DNS available at nginx-load time (HAProxy ingress is up
# regardless of cluster state).

upstream nebula_web_upstream {
    # OpenShift Route — internal hostname matches the cluster wildcard cert.
    server nebula-web-nebula-prod.apps.ocp-sno.caliptic.com:443;
    keepalive 16;
}

upstream nebula_api_upstream {
    server nebula-api-nebula-prod.apps.ocp-sno.caliptic.com:443;
    keepalive 16;
}

upstream nebula_game_upstream {
    server nebula-game-server-nebula-prod.apps.ocp-sno.caliptic.com:443;
    # Game-server uses sticky sessions inside OpenShift (HAProxy "source"
    # balance annotation), so we don't need ip_hash on nginx — but we DO
    # need keepalive so the WS upgrade survives the proxy hop.
    keepalive 32;
}

# ── nebula.caliptic.com — Next.js web ──────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name nebula.caliptic.com;

    # Cloudflare tunnel terminates TLS, so HTTP from CF to bastion is fine.
    # Real-IP comes through CF-Connecting-IP; restore it for the upstream
    # so OpenShift logs see the player, not the tunnel.
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;  # tunnel only — adjust if you ever expose
                                  # this nginx publicly

    access_log /var/log/nginx/nebula-web-access.log;
    error_log  /var/log/nginx/nebula-web-error.log warn;

    # Next.js needs >1MB body for image uploads, mock assets, etc.
    client_max_body_size 20m;

    location / {
        proxy_pass         https://nebula_web_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name     nebula-web-nebula-prod.apps.ocp-sno.caliptic.com;
        proxy_ssl_verify   off;   # cluster wildcard is self-signed re: nginx

        # Pass the real Host so OpenShift HAProxy can route by Host header.
        proxy_set_header   Host            nebula-web-nebula-prod.apps.ocp-sno.caliptic.com;
        proxy_set_header   X-Forwarded-Host   $host;
        proxy_set_header   X-Forwarded-Proto  https;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   Connection         "";

        # Next.js streaming responses (RSC, suspense).
        proxy_buffering    off;
        proxy_read_timeout 90s;
    }
}

# ── api-nebula.caliptic.com — NestJS REST + JWT ────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name api-nebula.caliptic.com;

    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    access_log /var/log/nginx/nebula-api-access.log;
    error_log  /var/log/nginx/nebula-api-error.log warn;

    # JWT bodies are small; avatar uploads etc. need ~5MB headroom.
    client_max_body_size 10m;

    location / {
        proxy_pass         https://nebula_api_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name     nebula-api-nebula-prod.apps.ocp-sno.caliptic.com;
        proxy_ssl_verify   off;

        proxy_set_header   Host            nebula-api-nebula-prod.apps.ocp-sno.caliptic.com;
        proxy_set_header   X-Forwarded-Host   $host;
        proxy_set_header   X-Forwarded-Proto  https;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   Connection         "";

        proxy_read_timeout 60s;
    }
}

# ── game-nebula.caliptic.com — NestJS socket.io + REST ─────────────────────
# This vhost needs WS-upgrade headers; the OpenShift Route already extends
# the HAProxy tunnel timeout to 5 minutes, so match that here.

server {
    listen 80;
    listen [::]:80;
    server_name game-nebula.caliptic.com;

    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    access_log /var/log/nginx/nebula-game-access.log;
    error_log  /var/log/nginx/nebula-game-error.log warn;

    client_max_body_size 10m;

    location / {
        proxy_pass         https://nebula_game_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name     nebula-game-server-nebula-prod.apps.ocp-sno.caliptic.com;
        proxy_ssl_verify   off;

        # Socket.io WebSocket upgrade.
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         $connection_upgrade;

        proxy_set_header   Host            nebula-game-server-nebula-prod.apps.ocp-sno.caliptic.com;
        proxy_set_header   X-Forwarded-Host   $host;
        proxy_set_header   X-Forwarded-Proto  https;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Real-IP          $remote_addr;

        # Match the cluster Route's 5-minute tunnel timeout.  Without this
        # nginx kills idle WS connections at its 60s default, and players
        # see Socket.io reconnects every minute during /battle.
        proxy_read_timeout  5m;
        proxy_send_timeout  5m;
    }
}

# ── Connection upgrade map (required for WebSockets) ───────────────────────
# This `map` directive MUST live in the http {} context.  If your bastion's
# nginx.conf already includes a `map $http_upgrade $connection_upgrade` (most
# stock distros do), DROP the block below to avoid a duplicate-name error on
# reload.  We define it inside an `if`-guarded `map` so it's idempotent only
# when this file is the first/only loader — otherwise comment it out.
#
# (nginx itself has no `ifndef`; the comment is the operational instruction.
#  `nginx -t` will tell you with a clear error if there's a duplicate.)
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
