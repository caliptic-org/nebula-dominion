version: '3.9'

# CI test compose — services use host networking so the Drone step container
# can reach them at localhost via the published ports on the Docker host.

services:

  postgres:
    image: postgres:16-alpine
    network_mode: host
    environment:
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD: nebula_test_password
      POSTGRES_DB: nebula_dominion
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebula -d nebula_dominion"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    network_mode: host
    command: redis-server --save "" --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    network_mode: host
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    network_mode: host
    environment:
      NODE_ENV: test
      PORT: 4000
      DATABASE_URL: postgresql://nebula:nebula_test_password@localhost:5432/nebula_dominion
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: nebula
      DB_PASSWORD: nebula_test_password
      DB_NAME: nebula_dominion
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 7d
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  game-server:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
    network_mode: host
    environment:
      NODE_ENV: test
      PORT: 5000
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 7d
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    network_mode: host
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_GAME_SERVER_URL: http://localhost:5000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
