version: '3.9'

networks:
  nebula-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nebula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebula_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-nebula_dominion}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nebula} -d ${POSTGRES_DB:-nebula_dominion}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nebula-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - nebula-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nebula-net
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_secret}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/game-assets &&
        mc mb --ignore-existing local/uploads &&
        mc mb --ignore-existing local/backups &&
        echo 'MinIO buckets ready'
      "
    networks:
      - nebula-net

  # ─── Applications ─────────────────────────────────────────────────────────────

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://nebula:nebula_dev_password@postgres:5432/nebula_dominion}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_secret}
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nebula-net
    restart: unless-stopped

  game-server:
    build:
      context: ./apps/game-server
      dockerfile: Dockerfile
    ports:
      - "${GAME_SERVER_PORT:-4001}:4001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4001
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MATCHMAKING_INITIAL_ELO_RANGE: ${MATCHMAKING_INITIAL_ELO_RANGE:-100}
      MATCHMAKING_ELO_EXPANSION_RATE: ${MATCHMAKING_ELO_EXPANSION_RATE:-50}
      MATCHMAKING_EXPANSION_INTERVAL_MS: ${MATCHMAKING_EXPANSION_INTERVAL_MS:-10000}
      MATCHMAKING_MAX_WAIT_MS: ${MATCHMAKING_MAX_WAIT_MS:-120000}
      MATCHMAKING_TICK_INTERVAL_MS: ${MATCHMAKING_TICK_INTERVAL_MS:-2000}
      GAME_ROOM_TTL_SECONDS: ${GAME_ROOM_TTL_SECONDS:-3600}
      RECONNECT_WINDOW_MS: ${RECONNECT_WINDOW_MS:-30000}
      MAX_ACTIONS_PER_SECOND: ${MAX_ACTIONS_PER_SECOND:-10}
      MAX_ROUND_DURATION_MS: ${MAX_ROUND_DURATION_MS:-30000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/api/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - nebula-net
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_GAME_SERVER_URL: ${NEXT_PUBLIC_GAME_SERVER_URL:-http://localhost:4001}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nebula-net
    restart: unless-stopped
