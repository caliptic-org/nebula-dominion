version: '3.9'

networks:
  nebula-net:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"
  nebula-internal:
    driver: overlay
    internal: true
    driver_opts:
      encrypted: "true"

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:
  web:
    image: registry.local/nebula-web:latest
    deploy:
      replicas: 4
      update_config:
        parallelism: 2
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      labels:
        - "autoscaler.enable=true"
        - "autoscaler.min_replicas=2"
        - "autoscaler.max_replicas=8"
        - "autoscaler.scale_up_cpu=70"
        - "autoscaler.scale_down_cpu=30"
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    networks:
      - nebula-net
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    image: registry.local/nebula-api:latest
    deploy:
      replicas: 6
      update_config:
        parallelism: 2
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      labels:
        - "autoscaler.enable=true"
        - "autoscaler.min_replicas=3"
        - "autoscaler.max_replicas=12"
        - "autoscaler.scale_up_cpu=70"
        - "autoscaler.scale_down_cpu=30"
    ports:
      - target: 4000
        published: 4000
        protocol: tcp
        mode: ingress
    networks:
      - nebula-net
      - nebula-internal
    environment:
      - NODE_ENV=production
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
    secrets:
      - database_url
      - redis_url
      - jwt_secret
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  game:
    image: registry.local/nebula-game:latest
    deploy:
      replicas: 4
      update_config:
        parallelism: 2
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      labels:
        - "autoscaler.enable=true"
        - "autoscaler.min_replicas=2"
        - "autoscaler.max_replicas=8"
        - "autoscaler.scale_up_cpu=70"
        - "autoscaler.scale_down_cpu=30"
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
        mode: ingress
    networks:
      - nebula-net
      - nebula-internal
    environment:
      - NODE_ENV=production
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
    secrets:
      - database_url
      - redis_url
      - jwt_secret
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    image: registry.local/nebula-worker:latest
    deploy:
      replicas: 4
      update_config:
        parallelism: 2
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      labels:
        - "autoscaler.enable=true"
        - "autoscaler.min_replicas=2"
        - "autoscaler.max_replicas=8"
        - "autoscaler.scale_up_cpu=70"
        - "autoscaler.scale_down_cpu=30"
    networks:
      - nebula-net
      - nebula-internal
    environment:
      - NODE_ENV=production
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL_FILE=/run/secrets/redis_url
    secrets:
      - database_url
      - redis_url
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:6000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  autoscaler:
    image: ghcr.io/wheel-next/docker-swarm-autoscaler:latest
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - SWARM_MANAGER_ADDRESS=unix:///var/run/docker.sock
      - CHECK_INTERVAL=30
      - SCALE_UP_THRESHOLD=70
      - SCALE_DOWN_THRESHOLD=30
      - COOLDOWN_PERIOD=120
    networks:
      - nebula-internal

secrets:
  database_url:
    external: true
  redis_url:
    external: true
  jwt_secret:
    external: true
