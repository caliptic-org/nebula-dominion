[global]
# Hetzner Storage Box repository via SFTP
repo1-type=sftp
repo1-sftp-host=${HETZNER_STORAGE_BOX_HOST}
repo1-sftp-host-user=${HETZNER_STORAGE_BOX_USER}
repo1-sftp-private-key-file=/home/postgres/.ssh/hetzner_backup_key
repo1-path=/nebula-dominion/pgbackrest
repo1-retention-full=4
repo1-retention-full-type=count
repo1-retention-archive=30
repo1-retention-archive-type=days
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass=${PGBACKREST_REPO1_CIPHER_PASS}

# Local fast repository for quicker restore (optional, on secondary disk)
repo2-type=posix
repo2-path=/mnt/backup/pgbackrest
repo2-retention-full=2
repo2-retention-archive=7
repo2-retention-archive-type=days
repo2-cipher-type=aes-256-cbc
repo2-cipher-pass=${PGBACKREST_REPO2_CIPHER_PASS}

# Compression
compress-type=lz4
compress-level=6

# Logging
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# Process count for parallel backup/restore
process-max=4

# Start/stop fast (don't wait for checkpoint)
start-fast=y

# Delta restore (faster incremental restore)
delta=y

[global:archive-push]
compress-level=3
compress-type=lz4

[global:restore]
process-max=8
delta=y

[nebula-pg]
pg1-path=/var/lib/postgresql/16/main
pg1-port=5432
pg1-socket-path=/var/run/postgresql
pg1-user=postgres
