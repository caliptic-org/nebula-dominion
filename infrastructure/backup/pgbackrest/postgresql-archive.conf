# Append these settings to postgresql.conf on both primary and replica
# File: /etc/postgresql/16/main/conf.d/pgbackrest-archive.conf

# WAL archiving — continuous archiving for PITR and offsite backup
archive_mode = on
archive_command = 'pgbackrest --stanza=nebula-pg archive-push %p'
archive_timeout = 60         # Force WAL segment switch every 60s (RPO ~1 min)

# WAL level must be replica or logical for archiving
wal_level = replica

# Keep enough WAL locally in case archiving lags
wal_keep_size = 2GB

# Allow standby to use pgBackRest archive for WAL fetching
restore_command = 'pgbackrest --stanza=nebula-pg archive-get %f %p'
