# nebula-proxy.conf — Nebula Dominion (LXC 204 @ 10.10.10.40)
# 3 subdomain: web / api / game-server (Socket.io WebSocket)

upstream nebula_web         { server 10.10.10.40:3000; keepalive 32; }
upstream nebula_api         { server 10.10.10.40:4000; keepalive 32; }
upstream nebula_gameserver  { server 10.10.10.40:3001; keepalive 32; }

# nebula.caliptic.com → Next.js web (port 3000)
server {
    listen 443 ssl;
    listen 80;
    server_name nebula.caliptic.com;

    ssl_certificate     /etc/letsencrypt/live/caliptic-bastion/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caliptic-bastion/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    include snippets/cf-realip.conf;

    proxy_read_timeout  3600;
    proxy_send_timeout  3600;
    client_max_body_size 10M;

    location / {
        proxy_pass         http://nebula_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# nebula-api.caliptic.com → NestJS REST API (port 4000)
server {
    listen 443 ssl;
    listen 80;
    server_name api-nebula.caliptic.com;

    ssl_certificate     /etc/letsencrypt/live/caliptic-bastion/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caliptic-bastion/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    include snippets/cf-realip.conf;

    proxy_read_timeout  3600;
    proxy_send_timeout  3600;
    client_max_body_size 25M;

    location / {
        proxy_pass         http://nebula_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# nebula-game.caliptic.com → Game server + Socket.io WebSocket (port 3001)
server {
    listen 443 ssl;
    listen 80;
    server_name game-nebula.caliptic.com;

    ssl_certificate     /etc/letsencrypt/live/caliptic-bastion/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caliptic-bastion/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    include snippets/cf-realip.conf;

    # Socket.io: long-lived, low-latency
    proxy_read_timeout  7200;
    proxy_send_timeout  7200;
    proxy_buffering     off;

    location / {
        proxy_pass         http://nebula_gameserver;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}
