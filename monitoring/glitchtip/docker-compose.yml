version: '3.9'

# GlitchTip — self-hosted Sentry-compatible error tracking
# Docs: https://glitchtip.com/documentation

networks:
  glitchtip:
    driver: overlay
    attachable: true
  monitoring:
    external: true

volumes:
  glitchtip_postgres: {}
  glitchtip_uploads: {}

x-environment: &glitchtip-env
  DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db/glitchtip
  SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
  PORT: 8080
  EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8090}
  DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@nebula.internal}
  CELERY_WORKER_AUTOSCALE: "1,3"
  CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
  ENABLE_USER_REGISTRATION: "False"
  I_PAID_FOR_GLITCHTIP: "False"

services:
  # ─── PostgreSQL for GlitchTip ────────────────────────────────────────────
  glitchtip-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD}
    volumes:
      - glitchtip_postgres:/var/lib/postgresql/data
    networks:
      - glitchtip
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: on-failure

  # ─── Redis for GlitchTip ─────────────────────────────────────────────────
  glitchtip-redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - glitchtip
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure

  # ─── GlitchTip Web ───────────────────────────────────────────────────────
  glitchtip-web:
    image: glitchtip/glitchtip:v4.0
    environment:
      <<: *glitchtip-env
      REDIS_URL: redis://glitchtip-redis:6379
    volumes:
      - glitchtip_uploads:/code/uploads
    ports:
      - target: 8080
        published: 8090
        protocol: tcp
        mode: host
    networks:
      - glitchtip
      - monitoring
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: on-failure
      labels:
        - "prometheus_scrape=true"
        - "prometheus_port=8080"
        - "prometheus_path=/metrics"

  # ─── GlitchTip Worker (Celery) ───────────────────────────────────────────
  glitchtip-worker:
    image: glitchtip/glitchtip:v4.0
    command: ./bin/run-celery-with-beat.sh
    environment:
      <<: *glitchtip-env
      REDIS_URL: redis://glitchtip-redis:6379
    volumes:
      - glitchtip_uploads:/code/uploads
    networks:
      - glitchtip
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 1G
      restart_policy:
        condition: on-failure

  # ─── Run DB migrations (one-shot) ────────────────────────────────────────
  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.0
    command: sh -c "python manage.py migrate && python manage.py createcachetable"
    environment:
      <<: *glitchtip-env
    networks:
      - glitchtip
    depends_on:
      - glitchtip-db
    deploy:
      replicas: 1
      restart_policy:
        condition: none
