apiVersion: 1

providers:
  - name: nebula-dashboards
    orgId: 1
    folder: 'Nebula Dominion'
    folderUid: nebula
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
