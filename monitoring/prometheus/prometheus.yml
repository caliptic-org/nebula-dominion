global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: nebula-dominion
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      api_version: v2

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ─── Prometheus self-monitoring ──────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ─── Node Exporter (all swarm nodes) ────────────────────────────────────
  - job_name: node
    dns_sd_configs:
      - names:
          - tasks.node-exporter
        type: A
        port: 9100
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):\d+'
        replacement: '${1}'

  # ─── cAdvisor (container metrics) ───────────────────────────────────────
  - job_name: cadvisor
    dns_sd_configs:
      - names:
          - tasks.cadvisor
        type: A
        port: 8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):\d+'
        replacement: '${1}'

  # ─── Postgres Exporter ──────────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - target_label: job
        replacement: postgres

  # ─── Redis Exporter ─────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  # ─── Alertmanager ───────────────────────────────────────────────────────
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  # ─── NestJS API servers ─────────────────────────────────────────────────
  - job_name: nebula-api
    dns_sd_configs:
      - names:
          - tasks.api
        type: A
        port: 3000
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):\d+'
        replacement: '${1}'

  # ─── NestJS Game servers ────────────────────────────────────────────────
  - job_name: nebula-game
    dns_sd_configs:
      - names:
          - tasks.game
        type: A
        port: 3001
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):\d+'
        replacement: '${1}'

  # ─── HAProxy ────────────────────────────────────────────────────────────
  - job_name: haproxy
    static_configs:
      - targets: ['haproxy:8404']
    metrics_path: /metrics

  # ─── Loki ───────────────────────────────────────────────────────────────
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics
