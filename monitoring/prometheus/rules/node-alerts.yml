groups:
  - name: node.infrastructure
    interval: 30s
    rules:
      # ─── CPU ─────────────────────────────────────────────────────────────
      - alert: HighCPUWarning
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ printf \"%.1f\" $value }}% (threshold: 80%) for 5 minutes."
          runbook: "https://wiki.nebula.internal/runbooks/high-cpu"

      - alert: CriticalCPU
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 5m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "CRITICAL: CPU at {{ printf \"%.1f\" $value }}% on {{ $labels.instance }}"
          description: "CPU usage exceeds 95% for 5 minutes. Immediate action required."

      # ─── Disk ────────────────────────────────────────────────────────────
      - alert: DiskUsageWarning
        expr: |
          (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|overlay",mountpoint!~"/boot.*"} / node_filesystem_size_bytes) * 100 > 85
        for: 2m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "Disk usage warning on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Disk at {{ printf \"%.1f\" $value }}% on {{ $labels.mountpoint }}."

      - alert: DiskUsageCritical
        expr: |
          (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|overlay",mountpoint!~"/boot.*"} / node_filesystem_size_bytes) * 100 > 95
        for: 1m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "CRITICAL: Disk at {{ printf \"%.1f\" $value }}% on {{ $labels.instance }}"
          description: "Disk critically full on {{ $labels.mountpoint }}. Risk of service disruption."

      - alert: DiskWillFillIn4Hours
        expr: |
          predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|overlay"}[1h], 4*3600) < 0
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "Disk on {{ $labels.instance }} will fill in 4 hours"
          description: "Filesystem {{ $labels.mountpoint }} is predicted to be full in 4 hours."

      # ─── Memory ──────────────────────────────────────────────────────────
      - alert: HighMemoryWarning
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "High memory usage on {{ $labels.instance }}: {{ printf \"%.1f\" $value }}%"
          description: "Memory usage is above 85% for 5 minutes."

      - alert: HighMemoryCritical
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "CRITICAL: Memory at {{ printf \"%.1f\" $value }}% on {{ $labels.instance }}"
          description: "Memory critically high. OOM killer may activate."

      # ─── Load Average ─────────────────────────────────────────────────────
      - alert: HighLoadAverage
        expr: |
          node_load15 / count without(cpu,mode) (node_cpu_seconds_total{mode="idle"}) > 1.5
        for: 10m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "High load average on {{ $labels.instance }}"
          description: "15-minute load average per CPU is {{ printf \"%.2f\" $value }}."

      # ─── Network ─────────────────────────────────────────────────────────
      - alert: NetworkReceiveErrors
        expr: rate(node_network_receive_errs_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "Network receive errors on {{ $labels.instance }}"
          description: "Interface {{ $labels.device }} has receive errors."

      # ─── Node Down ───────────────────────────────────────────────────────
      - alert: NodeDown
        expr: up{job="node"} == 0
        for: 1m
        labels:
          severity: critical
          team: devops
          page: "true"
        annotations:
          summary: "NODE DOWN: {{ $labels.instance }}"
          description: "Node exporter on {{ $labels.instance }} is unreachable for >1 minute."
