# /etc/nginx/conf.d/00-__SHORT__-maps.conf
#
# Optional companion to __SHORT__.conf — provides the `$connection_upgrade`
# map required by the WebSocket vhost.
#
# DEPLOY THIS ONLY IF stock nginx.conf doesn't already define the map:
#   sudo grep -R 'connection_upgrade' /etc/nginx/ | grep -v '/__SHORT__'
# Empty output → safe to install.  Any hit → SKIP (would cause "duplicate
# map directive" on reload).
#
# The `00-` prefix loads this before __SHORT__.conf alphabetically so the
# map is defined by the time the server blocks reference it.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
