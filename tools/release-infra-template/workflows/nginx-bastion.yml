name: Deploy Nginx Config

on:
  push:
    branches:
      - main
    paths:
      - 'deploy/nginx/**'
      - '.github/workflows/nginx-bastion.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Install __PROJECT__ nginx config on bastion
    runs-on: [self-hosted, bastion]
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pre-flight syntax check
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          mkdir -p "$TMP_DIR/conf.d"
          cp deploy/nginx/__SHORT__.conf "$TMP_DIR/conf.d/"
          cp deploy/nginx/00-__SHORT__-maps.conf "$TMP_DIR/conf.d/"
          cat > "$TMP_DIR/nginx.conf" <<EOF
          worker_processes 1;
          error_log $TMP_DIR/error.log warn;
          pid $TMP_DIR/nginx.pid;
          events { worker_connections 64; }
          http {
            include $TMP_DIR/conf.d/*.conf;
          }
          EOF
          nginx -t -c "$TMP_DIR/nginx.conf" -p "$TMP_DIR"

      - name: Install + reload nginx
        run: sudo bash deploy/nginx/install.sh

      - name: Smoke test vhosts
        run: |
          for host in __HOST_WEB__ __HOST_API__ __HOST_WS_LINE__; do
            STATUS=$(curl -sI -o /dev/null -w "%{http_code}" \
                          -H "Host: ${host}" \
                          --max-time 5 \
                          http://127.0.0.1/ || echo "000")
            echo "Host: ${host} -> HTTP ${STATUS}"
            case "$STATUS" in
              2*|3*|401|404|405) echo "  vhost OK" ;;
              502|503|504)       echo "  upstream unhealthy"; exit 1 ;;
              000|"")            echo "  nginx not responding"; exit 1 ;;
              *)                 echo "  unexpected ${STATUS} - continuing" ;;
            esac
          done
